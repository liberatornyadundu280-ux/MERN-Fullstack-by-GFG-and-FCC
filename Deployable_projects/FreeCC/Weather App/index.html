<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Application</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="light">
    <!-- ARIA Live Region for Announcements -->
    <div
      id="aria-live-announcer"
      class="sr-only"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="header-top">
          <h1 class="title">Weather Forecast</h1>
          <!-- Theme Toggle Button -->
          <button
            id="theme-toggle-button"
            class="theme-toggle-btn"
            aria-expanded="false"
            aria-label="Toggle theme menu"
            title="Change theme"
          >
            🎨
          </button>
        </div>

        <!-- Theme Menu -->
        <div
          id="theme-menu"
          class="theme-menu"
          hidden
          aria-label="Theme selection menu"
        >
          <button data-theme="light" class="theme-btn" title="Light theme">
            ☀️ Light
          </button>
          <button data-theme="dark" class="theme-btn" title="Dark theme">
            🌙 Dark
          </button>
          <button data-theme="rainbow" class="theme-btn" title="Rainbow theme">
            🌈 Rainbow
          </button>
        </div>

        <p class="subtitle">Get real-time weather information</p>
        <div class="header-controls">
          <label class="toggle-label">
            <input type="checkbox" id="temp-toggle" class="toggle-checkbox" />
            <span class="toggle-text">°F</span>
          </label>
        </div>
      </header>
      <p id="message" class="message hidden">Fetching weather...</p>
      <!-- Search Section -->
      <section class="search-section">
        <div class="search-container">
          <label for="city-select" class="label">Select a City:</label>
          <select id="city-select" class="city-select">
            <option value="">Choose a city...</option>
            <option value="New York">New York</option>
            <option value="Los Angeles">Los Angeles</option>
            <option value="Chicago">Chicago</option>
            <option value="Houston">Houston</option>
            <option value="Phoenix">Phoenix</option>
            <option value="Philadelphia">Philadelphia</option>
            <option value="San Antonio">San Antonio</option>
            <option value="San Diego">San Diego</option>
            <option value="Dallas">Dallas</option>
            <option value="San Jose">San Jose</option>
            <option value="Austin">Austin</option>
            <option value="Miami">Miami</option>
            <option value="Denver">Denver</option>
            <option value="Seattle">Seattle</option>
            <option value="Boston">Boston</option>
            <option value="London">London</option>
            <option value="Paris">Paris</option>
            <option value="Tokyo">Tokyo</option>
            <option value="Dubai">Dubai</option>
            <option value="Sydney">Sydney</option>
          </select>
          <button id="get-weather-btn" class="btn-get-weather">
            Get Weather
          </button>
        </div>
      </section>

      <!-- Weather Display Section -->
      <section id="weather-display" class="weather-display hidden">
        <div class="weather-card">
          <!-- Location -->
          <div class="location-section">
            <h2 id="location" class="location-name">—</h2>
          </div>

          <!-- Main Weather Info -->
          <div class="main-weather">
            <div class="weather-icon-container">
              <img
                id="weather-icon"
                src=""
                alt="Weather Icon"
                class="weather-icon"
              />
            </div>
            <div class="main-info">
              <div class="temperature-section">
                <span id="main-temperature" class="main-temperature">—</span>
                <span class="temperature-unit">°C</span>
              </div>
              <p id="weather-main" class="weather-description">—</p>
            </div>
          </div>

          <!-- Weather Details Grid -->
          <div class="weather-details">
            <div class="detail-card">
              <div class="detail-icon">🌡️</div>
              <div class="detail-content">
                <p class="detail-label">Feels Like</p>
                <p id="feels-like" class="detail-value">—</p>
              </div>
            </div>

            <div class="detail-card">
              <div class="detail-icon">💧</div>
              <div class="detail-content">
                <p class="detail-label">Humidity</p>
                <p id="humidity" class="detail-value">—</p>
              </div>
            </div>

            <div class="detail-card">
              <div class="detail-icon">💨</div>
              <div class="detail-content">
                <p class="detail-label">Wind Speed</p>
                <p id="wind" class="detail-value">—</p>
              </div>
            </div>

            <div class="detail-card">
              <div class="detail-icon">🌪️</div>
              <div class="detail-content">
                <p class="detail-label">Wind Gust</p>
                <p id="wind-gust" class="detail-value">—</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <p>&copy; 2026 Weather Forecast App | Powered by OpenWeatherMap API</p>
      </footer>
    </div>

    <script src="theme-changer.js"></script>
    <script src="script.js"></script>
  </body>
</html>
