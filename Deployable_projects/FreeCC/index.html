<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drum Machine</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ================= HEADER ================= -->
    <header class="site-header">
      <h1>Drum Machine</h1>
      <p>Play with Q W E / A S D / Z X C</p>
    </header>

    <!-- ================= MAIN ================= -->
    <main>
      <div id="drum-machine" class="container">
        <!-- ===== PAD BANK ===== -->
        <section id="pad-bank" class="pad-grid">
          <button class="drum-pad" data-key="Q">
            <span class="key">Q</span>
            <span class="label">Heater 1</span>
          </button>

          <button class="drum-pad" data-key="W">
            <span class="key">W</span>
            <span class="label">Heater 2</span>
          </button>

          <button class="drum-pad" data-key="E">
            <span class="key">E</span>
            <span class="label">Heater 3</span>
          </button>

          <button class="drum-pad" data-key="A">
            <span class="key">A</span>
            <span class="label">Heater 4</span>
          </button>

          <button class="drum-pad" data-key="S">
            <span class="key">S</span>
            <span class="label">Clap</span>
          </button>

          <button class="drum-pad" data-key="D">
            <span class="key">D</span>
            <span class="label">Open Hat</span>
          </button>

          <button class="drum-pad" data-key="Z">
            <span class="key">Z</span>
            <span class="label">Kick Hat</span>
          </button>

          <button class="drum-pad" data-key="X">
            <span class="key">X</span>
            <span class="label">Kick</span>
          </button>

          <button class="drum-pad" data-key="C">
            <span class="key">C</span>
            <span class="label">Closed Hat</span>
          </button>
        </section>

        <!-- ===== CONTROLS ===== -->
        <aside class="controls">
          <!-- Power -->
          <div class="power-control">
            <label for="power-toggle">
              Power:
              <strong id="state">ON</strong>
            </label>
            <input type="checkbox" id="power-toggle" checked />
          </div>

          <!-- Display -->
          <p id="display" class="display">Heater Kit</p>

          <!-- Volume -->
          <div class="volume-control">
            <label for="volume">Volume</label>
            <input
              type="range"
              id="volume"
              min="0"
              max="1"
              step="0.01"
              value="0.7"
            />
          </div>

          <!-- Bank -->
          <div class="bank-control">
            <label for="bank">Sound Bank</label>
            <select id="bank">
              <option value="HEATER">Heater Kit</option>
              <option value="FX">FX</option>
              <option value="SOFT_PIANO">Soft Piano</option>
            </select>
          </div>

          <!-- Recording -->
          <div class="record-control">
            <button id="record-btn">Record</button>
            <button id="stop-btn">Stop</button>
            <button id="play-btn">Play</button>
          </div>
        </aside>
      </div>
      <div id="toast-container"></div>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="site-footer">
      <p>Built with HTML Audio & JavaScript</p>
    </footer>

    <!-- ================= SCRIPT ================= -->
    <script src="script.js"></script>
  </body>
</html>
