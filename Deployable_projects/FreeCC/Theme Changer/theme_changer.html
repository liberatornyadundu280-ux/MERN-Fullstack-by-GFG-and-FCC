<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessible Theme Switcher</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <!-- i would have used the class attribute but seels like it would have a lengthy code and is not that good
   do thats why need to use data-theme which is used to swtich the themes but just passsing the arguments in js we will see the passing in js
    -->
  <body data-theme="light">
    <div id="theme-switcher-container">
      <!--to access  the list with the  theme preferences -->
      <button
        id="theme-toggle-button"
        aria-expanded="false"
        aria-controls="theme-menu"
      >
        Switch Theme
      </button>

      <ul id="theme-menu" role="menu" hidden>
        <li role="presentation">
          <button role="menuitem" data-theme="light">Light ☀️</button>
        </li>
        <li role="presentation">
          <button role="menuitem" data-theme="dark">Dark 🌙</button>
        </li>
        <li role="presentation">
          <button role="menuitem" data-theme="rainbow">Rainbow 🌈</button>
        </li>
      </ul>
    </div>

    <div id="aria-live-announcer" aria-live="polite" class="sr-only"></div>

    <main style="padding: 150px; text-align: center">
      <h1>Theme Switcher Project</h1>
      <p>Scroll down to see the button stay in the corner.</p>
      <p>This paragraph text will change color based on the selected theme.</p>
      <div style="height: 100vh"></div>
      <p>More content at the bottom.</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
