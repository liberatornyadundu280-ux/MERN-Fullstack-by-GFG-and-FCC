<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown to HTML Converter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body data-theme="light">
    <div id="theme-switcher-container">
      <!--to access  the list with the  theme preferences -->
      <button
        id="theme-toggle-button"
        aria-expanded="false"
        aria-controls="theme-menu"
      >
        Switch Theme
      </button>

      <ul id="theme-menu" role="menu" hidden>
        <li role="presentation">
          <button role="menuitem" data-theme="light">Light ☀️</button>
        </li>
        <li role="presentation">
          <button role="menuitem" data-theme="dark">Dark 🌙</button>
        </li>
        <li role="presentation">
          <button role="menuitem" data-theme="rainbow">Rainbow 🌈</button>
        </li>
      </ul>
    </div>

    <div id="aria-live-announcer" aria-live="polite" class="sr-only"></div>
    <h1>Markdown to HTML Converter</h1>
    <div id="container" class="main">
      <div class="container">
        <h2>Markdown Input:</h2>
        <textarea
          id="markdown-input"
          placeholder="Enter your markdown here..."
        ></textarea>
      </div>
      <div class="container">
        <h2>Raw HTML Output:</h2>
        <div id="html-output"></div>
      </div>
      <div class="container">
        <h2>HTML Preview:</h2>
        <div id="preview"></div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
